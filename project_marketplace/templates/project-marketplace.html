{% load static %}

<!doctype html>

<html>
  <head>
    <title>Project marketplace</title>

    <link rel="stylesheet" href="{% static 'css/project-marketplace.css' %}" />
  </head>

  <body>
    <div id="main-container">
      <span class="hero-tag">Project Marketplace</span>

      <div id="project-container">
        {% for i in projects %}
        <div class="project-card">
          <span class="title"> {{ i.title }} </span>
          <span class="description"> {{ i.short_description }} </span>
          <span class="status"> status: {{ i.status }} </span>

          <div class="btn-group">
            <a href="{% url 'project_details' project_id=i.id%}">
            <span class="view-btn"> Show </span>
            </a>
          </div>
        </div>
        <!-- project card -->
        {% endfor %}
      </div>
      <!-- project container -->
    </div>
    <!-- main container -->
  </body>
</html>
